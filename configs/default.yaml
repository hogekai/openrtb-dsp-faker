# openrtb-dsp-faker default configuration
# Mock DSP settings for SSP/Ad Exchange developers to test DSP integrations

# Server settings
server:
  port: 8081
  read_timeout_ms: 5000
  write_timeout_ms: 5000

# DSP behavior simulation
behavior:
  # Bid probability (0.0 ~ 1.0)
  # 1.0 = always bid, 0.0 = always no-bid
  bid_rate: 0.7

  # Latency simulation
  # Real DSPs typically respond in 50-100ms
  latency:
    min_ms: 10
    max_ms: 80

  # Error simulation
  error:
    # HTTP error rate (0.0 ~ 1.0)
    rate: 0.02
    # HTTP status codes to return (randomly selected)
    codes: [500, 503]

  # Timeout simulation
  # Intentionally exceed the bid request tmax
  timeout_rate: 0.01

# Bidding settings
bidding:
  # Bid price range (USD CPM)
  price:
    min: 0.50
    max: 15.00
  # Currency
  currency: "USD"
  # Seat name
  seat: "faker-dsp-seat-1"
  # Advertiser domains
  advertiser_domains:
    - "example-advertiser.com"
    - "brand-demo.com"
  # Dummy ad markup template
  adm_template: '<div class="faker-ad">Faker DSP Ad - ${CREATIVE_ID}</div>'

# --------------------------------------------------------------------------
# Custom extended parameters
# Features useful for SSP DSP integration testing
# --------------------------------------------------------------------------
custom:
  # Bid rate differentiation per imp type
  # Falls back to behavior.bid_rate when not specified
  # Simulates the tendency for video to have lower bid rates than banner
  bid_rate_by_imp_type:
    banner: 0.8
    video: 0.5

  # Behavior overrides for specific domains/bundles
  # Useful for SSP testing scenarios like "no-bid only for a specific publisher"
  domain_overrides:
    - domain: "blocked-publisher.com"
      no_bid: true
    - domain: "premium-publisher.com"
      bid_rate: 0.95
      price_min: 5.00
      price_max: 25.00
    - bundle: "com.example.gameapp"
      bid_rate: 0.6
      price_min: 1.00
      price_max: 8.00

  # Creative size variations
  # Randomly selected when the imp has no size specified
  creative_sizes:
    - { w: 300, h: 250 }
    - { w: 728, h: 90 }
    - { w: 320, h: 50 }
    - { w: 160, h: 600 }

  # PMP deal support
  # Simulates DSP responding to private deals with specified deal IDs
  deal_support:
    enabled: false
    deals:
      - deal_id: "deal-001"
        bidfloor: 5.00
        seat: "pmp-seat-1"

  # No-Bid Reason (nbr)
  # Simulates returning OpenRTB 2.6 no-bid reason codes
  # 0=Unknown, 1=Technical Error, 2=Invalid Request,
  # 3=Known Web Spider, 4=Suspected Non-Human, 5=Cloud/Data Center,
  # 6=Unsupported Device, 7=Blocked Publisher, 8=Unmatched User
  no_bid_reason:
    enabled: false
    codes: [0, 7, 8]
